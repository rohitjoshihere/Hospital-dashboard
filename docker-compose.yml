version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medicaldashboard}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    # Run migrations then start the API server
    entrypoint: ["/bin/sh", "/app/entrypoint.sh"]
    command: ["npx", "ts-node", "server.ts"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-medicaldashboard}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-changeme_in_production}
      UPLOAD_DIR: /app/uploads
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-development}
    volumes:
      - media_files:/app/uploads
      - thumb_files:/app/thumbnails
    ports:
      - "3001:3001"

  worker:
    build: ./backend
    command: ["npx", "ts-node", "worker.ts"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-medicaldashboard}
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /app/uploads
      NODE_ENV: ${NODE_ENV:-development}
    volumes:
      - media_files:/app/uploads
      - thumb_files:/app/thumbnails

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  postgres_data:
  media_files:
  thumb_files:
